<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Astero1ds</title>
    <style>
        body {
    background-color: #111;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    box-sizing: border-box;
    /* Quitamos flex-direction: column y overflow: hidden de aquí */
}

/* Agrega esta regla nueva para envolver el juego y los botones */
.contenedor-juego {
    display: flex;
    flex-direction: column;
    align-items: center;
}

        canvas {
            border: 2px solid white;
            background-color: black;
        }
        body {
    background-color: #111;
    display: flex;
    flex-direction: column; /* Esto hace que los botones vayan ABAJO del juego y no a los lados */
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow: hidden; /* Evita barras de desplazamiento raras */
}

canvas {
    border: 2px solid white;
    background-color: black;
}

#controles-touch {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

#controles-touch button {
    background: transparent;
    color: white;
    border: 2px solid white;
    padding: 15px 25px;
    font-size: 24px;
    border-radius: 8px;
    user-select: none;
    touch-action: manipulation;
}

#btn-disparo {
    background-color: rgba(255, 0, 0, 0.2) !important;
}
    </style>
    
</head>
<body>
    <canvas id="canvasJuego" width="800" height="600"></canvas>
    <script src="juego.js"></script>
</body>
</html>
<body>

    <div class="contenedor-juego">
        <canvas id="canvasJuego" width="800" height="600"></canvas>

        <div id="controles-touch">
            <button id="btn-izq">◀</button>
            <button id="btn-arriba">▲</button>
            <button id="btn-der">▶</button>
            <button id="btn-disparo">🔥</button>
        </div>
    </div>

    <script src="juego.js"></script>
</body>
